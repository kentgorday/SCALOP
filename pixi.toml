[workspace]
name = "scalop"
version = "1.0.0"
description = "Sequence-based antibody Canonical LOoP structure annotation"
channels = ["conda-forge", "bioconda"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
python = "3.11.*"
numpy = "*"
pandas = "*"
biopython = "*"
hmmer = "3.4.*"
anarci = "2024.05.21.*"  # BSD-3 ANARCI from bioconda (replaces the removed GPLv3 bundle)
pytest = "*"

# Editable install so `import scalop` works anywhere in the env. Runtime deps stay
# conda-managed above -- setup.py declares no install_requires, so pip/uv won't pull
# PyPI copies of numpy/pandas/anarci over the conda-provided ones.
[pypi-dependencies]
scalop = { path = ".", editable = true }

[tasks]
# collection scope lives in pytest.ini
test = "pytest -q"
